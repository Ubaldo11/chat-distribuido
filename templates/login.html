<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0d0d0f;
            --surface: #16161a;
            --border:  #2a2a30;
            --accent:  #7c6af7;
            --accent2: #c084fc;
            --text:    #e8e8f0;
            --muted:   #6b6b80;
            --error:   #f87171;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* grade decorativa de fundo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.35;
            pointer-events: none;
        }

        /* brilho central */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(124,106,247,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.04em;
        }

        .btn:hover  { opacity: 0.88; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .erro {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.8rem;
            min-height: 1.2rem;
            text-align: center;
        }

        .rodape {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .rodape a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 500;
        }

        .rodape a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💬 chat</div>
        <div class="subtitle">Entre na sua conta para continuar.</div>

        <label for="nome">Usuário</label>
        <input type="text" id="nome" placeholder="seu nome" autocomplete="username">

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">

        <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
        <div class="erro" id="erro"></div>

        <div class="rodape">
            Não tem conta? <a href="/cadastro">Cadastre-se</a>
        </div>
    </div>

    <script>
        // permite enviar com Enter
        document.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });

        async function entrar() {
            const nome  = document.getElementById("nome").value.trim();
            const senha = document.getElementById("senha").value.trim();
            const erro  = document.getElementById("erro");
            const btn   = document.getElementById("btn-entrar");

            erro.textContent = "";

            if (!nome || !senha) {
                erro.textContent = "Preencha todos os campos.";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Entrando...";

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome, senha })
            });

            const data = await res.json();

            if (data.ok) {
                window.location.href = "/";
            } else {
                erro.textContent = data.erro || "Erro ao entrar.";
                btn.disabled = false;
                btn.textContent = "Entrar";
            }
        }
    </script>
</body>
</html>
